<header>
    <div class="logo">Le Calao Doré</div>
    <button class="burger" (click)="toggleMenu()">&#9776;</button>
    @if (isMenuOpen) {
        <nav>
         @for (link of links; track link) {
              <a [class.actvie]="activeLink === link"
              (click)="setActive(link)">
              {{link}}
         </a>
          }
              </nav>
         }
         </header>
